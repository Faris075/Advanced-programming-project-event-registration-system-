# ============================================================
# application-test.properties
# H2 in-memory database settings for the "test" Spring profile.
# Used by all @DataJpaTest and @SpringBootTest tests.
#
# Hibernate creates the schema automatically from entity classes
# (create-drop), so no schema.sql is needed during tests.
# ============================================================

# Use H2 in-memory database (MariaDB-compatible mode)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate auto-create the schema from entity annotations during tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# CRITICAL: Disable Spring Boot's SQL initializer so schema.sql is NOT executed
# against H2. H2 does not support MariaDB-specific syntax like CREATE DATABASE.
# Hibernate create-drop handles schema creation from entity metadata instead.
spring.sql.init.mode=never

# Disable Thymeleaf cache (irrelevant for JPA tests but safe to set)
spring.thymeleaf.cache=false

# Disable mail auto-configuration – not needed for unit/integration tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Suppress startup banners in test output
spring.main.banner-mode=off

# Suppress the DataSeeder from running automatically during @SpringBootTest
# (DataSeederTest runs it explicitly via dataSeeder.run())
evently.seeder.enabled=false
