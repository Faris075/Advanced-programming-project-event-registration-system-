# ============================================================
# application.properties  –  non-secret defaults
# Sensitive values are loaded from environment variables or
# application-local.properties (gitignored).
# ============================================================

spring.application.name=evently
server.port=8080

# --- DataSource (credentials from env vars) ---
spring.datasource.url=jdbc:mysql://localhost:3306/evently_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# validate: Hibernate checks the schema matches entities on startup but never alters tables.
# Switch to 'create-drop' only on a local throwaway DB to auto-create tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# --- Mail (credentials from env vars) ---
spring.mail.host=${MAIL_HOST:smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Security ---
# Remember-me token signing key  – override via env var in production
evently.security.remember-me-key=${APP_SECRET:evently-dev-secret-change-me}

# --- Logging ---
logging.level.com.evently=DEBUG
logging.level.org.springframework.security=INFO
