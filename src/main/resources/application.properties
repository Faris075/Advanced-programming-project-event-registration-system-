# ============================================================
# application.properties  –  non-secret defaults
# Sensitive values are loaded from environment variables or
# application-local.properties (gitignored).
# ============================================================

spring.application.name=evently
server.port=8080
spring.profiles.active=local

# --- DataSource (credentials from env vars) ---
spring.datasource.url=jdbc:mariadb://localhost:3306/evently_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# --- JPA / Hibernate ---
# validate: Hibernate checks the schema matches entities on startup but never alters tables.
# Switch to 'create-drop' only on a local throwaway DB to auto-create tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# --- Mailtrap Email API ---
# Disable Spring Boot's SMTP auto-configuration; we use Mailtrap's HTTP API instead.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
mailtrap.api.token=${MAILTRAP_API_TOKEN:}
# Sandbox inbox ID – required for Email Testing (Mailtrap sandbox).
# Leave blank to route to the Sending API (production).
mailtrap.inbox.id=${MAILTRAP_INBOX_ID:}
mailtrap.from.email=${MAILTRAP_FROM_EMAIL:noreply@evently.dev}

# --- Security ---
# Remember-me token signing key  – override via env var in production
evently.security.remember-me-key=${APP_SECRET:evently-dev-secret-change-me}

# --- Logging ---
logging.level.com.evently=DEBUG
logging.level.org.springframework.security=INFO
