<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: content('Admin Dashboard', ~{::pageBody})}">
<div th:fragment="pageBody">

    <div class="admin-page-header">
        <h1 class="admin-heading"><i class="fas fa-tachometer-alt icon-heading"></i>Dashboard</h1>
        <a th:href="@{/admin/events/create}" class="admin-button"><i class="fas fa-plus"></i> Create Event</a>
    </div>

    <!-- Stat cards -->
    <div class="stats-grid">
        <div class="stat-card">
            <h3><i class="fas fa-calendar-alt icon-stat-blue"></i>Total Events</h3>
            <div class="stat-value" th:text="${totalEvents}">0</div>
        </div>
        <div class="stat-card">
            <h3><i class="fas fa-check-circle icon-stat-green"></i>Published</h3>
            <div class="stat-value" th:text="${publishedEvents}">0</div>
        </div>
        <div class="stat-card">
            <h3><i class="fas fa-ticket-alt icon-stat-orange"></i>Registrations</h3>
            <div class="stat-value" th:text="${totalRegistrations}">0</div>
        </div>
        <div class="stat-card">
            <h3><i class="fas fa-user-check icon-stat-green"></i>Confirmed</h3>
            <div class="stat-value" th:text="${confirmedRegistrations}">0</div>
        </div>
        <div class="stat-card">
            <h3><i class="fas fa-clock icon-stat-yellow"></i>Waitlisted</h3>
            <div class="stat-value" th:text="${waitlistedRegistrations}">0</div>
        </div>
        <div class="stat-card">
            <h3><i class="fas fa-users icon-stat-blue"></i>Users</h3>
            <div class="stat-value" th:text="${totalUsers}">0</div>
        </div>
    </div>

    <!-- Recent events table -->
    <div class="admin-card admin-card-top">
        <div class="admin-page-header admin-subheader">
            <h2 class="card-section-title">
                <i class="fas fa-history icon-subheading"></i>Recent Events
            </h2>
            <a th:href="@{/admin/events}" class="admin-button">View All</a>
        </div>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Created</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="event : ${recentEvents}">
                    <td><a th:href="@{/admin/events/{id}/edit(id=${event.id})}" th:text="${event.title}" class="table-event-link">Event title</a></td>
                    <td th:text="${#temporals.format(event.dateTime, 'MMM dd, yyyy HH:mm')}">Date</td>
                    <td>
                        <span class="badge badge-published" th:if="${event.status.name() == 'PUBLISHED'}" th:text="${event.status}"></span>
                        <span class="badge badge-draft"     th:if="${event.status.name() == 'DRAFT'}"     th:text="${event.status}"></span>
                        <span class="badge badge-completed" th:if="${event.status.name() == 'COMPLETED'}" th:text="${event.status}"></span>
                        <span class="badge badge-cancelled" th:if="${event.status.name() == 'CANCELLED'}" th:text="${event.status}"></span>
                    </td>
                    <td th:text="${#temporals.format(event.createdAt, 'MMM dd, yyyy')}">Created</td>
                </tr>
                <tr th:if="${#lists.isEmpty(recentEvents)}">
                    <td colspan="4" class="table-empty-cell">No events yet.</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</html>
