<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{admin/layout :: content('Create Event', ~{::pageBody})}">
<div th:fragment="pageBody">
    <section class="admin-card">
        <h1 class="admin-heading">Create Event</h1>

        <form th:action="@{/admin/events/create}" th:object="${eventDto}" method="post" style="margin-top:1rem;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <label>
                Title
                <input type="text" th:field="*{title}" />
            </label>
            <div th:if="${#fields.hasErrors('title')}" style="color:#b91c1c;" th:errors="*{title}"></div>

            <label style="display:block; margin-top:1rem;">
                Description
                <textarea th:field="*{description}" rows="5"></textarea>
            </label>
            <div th:if="${#fields.hasErrors('description')}" style="color:#b91c1c;" th:errors="*{description}"></div>

            <label style="display:block; margin-top:1rem;">
                Date and time
                <input type="datetime-local" th:field="*{dateTime}" />
            </label>
            <div th:if="${#fields.hasErrors('dateTime')}" style="color:#b91c1c;" th:errors="*{dateTime}"></div>

            <label style="display:block; margin-top:1rem;">
                Location
                <input type="text" th:field="*{location}" />
            </label>
            <div th:if="${#fields.hasErrors('location')}" style="color:#b91c1c;" th:errors="*{location}"></div>

            <label style="display:block; margin-top:1rem;">
                Capacity
                <input type="number" th:field="*{capacity}" min="1" />
            </label>
            <div th:if="${#fields.hasErrors('capacity')}" style="color:#b91c1c;" th:errors="*{capacity}"></div>

            <label style="display:block; margin-top:1rem;">
                Price
                <input type="number" th:field="*{price}" step="0.01" min="0" />
            </label>
            <div th:if="${#fields.hasErrors('price')}" style="color:#b91c1c;" th:errors="*{price}"></div>

            <div style="margin-top:1.5rem;">
                <button type="submit" class="admin-button">Create Event</button>
                <a th:href="@{/admin/events}" class="admin-button" style="background:#64748b;">Cancel</a>
            </div>
        </form>
    </section>
</div>
</html>
