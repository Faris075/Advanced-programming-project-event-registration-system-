<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{admin/layout :: content('Admin Events', ~{::pageBody})}">
<div th:fragment="pageBody">
    <section class="admin-card">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem;">
            <div>
                <h1 class="admin-heading">Events</h1>
                <p>Manage event drafts, published events, and cancellations.</p>
            </div>
            <a th:href="@{/admin/events/create}" class="admin-button">Create Event</a>
        </div>

        <div th:if="${success}" style="margin-top:1rem; padding:1rem; border:1px solid #22c55e; background:#ecfdf5; color:#166534;"> <p th:text="${success}"></p></div>
        <div th:if="${error}" style="margin-top:1rem; padding:1rem; border:1px solid #f87171; background:#fef2f2; color:#991b1b;"> <p th:text="${error}"></p></div>

        <table class="admin-table" style="margin-top:1.5rem;">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Date</th>
                    <th>Location</th>
                    <th>Capacity</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="event : ${events.content}">
                    <td th:text="${event.title}">Title</td>
                    <td th:text="${#temporals.format(event.dateTime, 'MMM dd, yyyy HH:mm')}">Date</td>
                    <td th:text="${event.location}">Location</td>
                    <td th:text="${event.capacity}">100</td>
                    <td th:text="${event.status}">STATUS</td>
                    <td>
                        <a th:href="@{/admin/events/{id}/edit(id=${event.id})}" class="admin-button" style="margin-right:.5rem;">Edit</a>

                        <form th:action="@{/admin/events/{id}/publish(id=${event.id})}" method="post" style="display:inline-block; margin-right:.25rem;" th:if="${event.status == T(com.evently.model.EventStatus).DRAFT}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="admin-button">Publish</button>
                        </form>

                        <form th:action="@{/admin/events/{id}/cancel(id=${event.id})}" method="post" style="display:inline-block; margin-right:.25rem;" th:if="${event.status == T(com.evently.model.EventStatus).PUBLISHED}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="admin-button">Cancel</button>
                        </form>

                        <form th:action="@{/admin/events/{id}/delete(id=${event.id})}" method="post" style="display:inline-block;" th:if="${event.status == T(com.evently.model.EventStatus).DRAFT} || ${event.status == T(com.evently.model.EventStatus).CANCELLED}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="admin-button" style="background:#ef4444;">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="pagination" th:if="${totalPages > 1}" style="margin-top:1rem;">
            <a th:href="@{/admin/events(page=${currentPage - 1}, size=${10})}" th:if="${currentPage > 0}" class="admin-button">Previous</a>
            <span>Page <strong th:text="${currentPage + 1}">1</strong> of <strong th:text="${totalPages}">1</strong></span>
            <a th:href="@{/admin/events(page=${currentPage + 1}, size=${10})}" th:if="${currentPage + 1 < totalPages}" class="admin-button">Next</a>
        </div>
    </section>
</div>
</html>
