<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: content('Edit Event', ~{::pageBody})}">
<div th:fragment="pageBody">

    <div class="admin-page-header">
        <h1 class="admin-heading"><i class="fas fa-edit" style="margin-right:.5rem;opacity:.7;"></i>Edit Event</h1>
        <a th:href="@{/admin/events}" class="admin-button secondary">
            <i class="fas fa-arrow-left"></i> Back to Events
        </a>
    </div>

    <div class="admin-card">
        <p style="margin-bottom:1.25rem;color:rgba(255,255,255,.6);font-size:.875rem;">
            Status: <span class="badge badge-published" th:if="${eventDto.status.name() == 'PUBLISHED'}" th:text="${eventDto.status}"></span>
                    <span class="badge badge-draft"     th:if="${eventDto.status.name() == 'DRAFT'}"     th:text="${eventDto.status}"></span>
                    <span class="badge badge-completed" th:if="${eventDto.status.name() == 'COMPLETED'}" th:text="${eventDto.status}"></span>
                    <span class="badge badge-cancelled" th:if="${eventDto.status.name() == 'CANCELLED'}" th:text="${eventDto.status}"></span>
        </p>

        <form th:action="@{/admin/events/{id}/edit(id=${eventId})}" th:object="${eventDto}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-grid">
                <div>
                    <label for="title">Title</label>
                    <input id="title" type="text" th:field="*{title}" placeholder="Event title" />
                    <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                </div>
                <div>
                    <label for="location">Location</label>
                    <input id="location" type="text" th:field="*{location}" placeholder="Venue or address" />
                    <span class="field-error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></span>
                </div>
                <div>
                    <label for="dateTime">Date &amp; Time</label>
                    <input id="dateTime" type="datetime-local" th:field="*{dateTime}" />
                    <span class="field-error" th:if="${#fields.hasErrors('dateTime')}" th:errors="*{dateTime}"></span>
                </div>
                <div>
                    <label for="capacity">Capacity</label>
                    <input id="capacity" type="number" th:field="*{capacity}" min="1" />
                    <span class="field-error" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></span>
                </div>
                <div>
                    <label for="price">Price ($)</label>
                    <input id="price" type="number" th:field="*{price}" step="0.01" min="0" />
                    <span class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
                </div>
            </div>

            <div>
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" rows="5"></textarea>
                <span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </div>

            <div style="display:flex;gap:.75rem;margin-top:.5rem;">
                <button type="submit" class="admin-button"><i class="fas fa-save"></i> Save Changes</button>
                <a th:href="@{/admin/events}" class="admin-button secondary">Cancel</a>
            </div>
        </form>
    </div>

</div>
</html>
