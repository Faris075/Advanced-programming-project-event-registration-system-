<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: content(${event.title}, ~{::pageBody})}">
<div th:fragment="pageBody">

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-error"   th:if="${errorMessage}"   th:text="${errorMessage}"></div>

    <section class="event-detail">
        <div class="event-detail-header">
            <div>
                <h1 th:text="${event.title}">Event Title</h1>
                <p class="event-meta" th:text="${#temporals.format(event.dateTime, 'MMM dd, yyyy HH:mm')}">Date</p>
                <p class="event-location" th:text="${event.location}">Location</p>
            </div>
            <div class="event-status-panel">
                <p class="event-price" th:text="${event.free ? 'Free' : '$' + event.price}">Free</p>
                <p><strong>Capacity:</strong> <span th:text="${event.capacity}">100</span></p>
                <p th:if="${isSoldOut}" class="badge badge-sold-out">Sold Out</p>
                <p th:unless="${isSoldOut}" class="badge badge-available" th:text="${spotsLeft} + ' spots left'">12 spots left</p>
            </div>
        </div>

        <div class="event-description">
            <h2>Description</h2>
            <p th:text="${event.description}">Event description</p>
        </div>

        <div class="waitlist-message" th:if="${isSoldOut}">
            <p th:text="${waitlistCount} + ' people on waitlist'">12 people on waitlist</p>
        </div>

        <div class="registration-form">
            <h2 th:text="${isSoldOut ? 'Join the waitlist' : 'Register now'}">Register now</h2>

            <!-- Must be logged in to register -->
            <div sec:authorize="isAnonymous()">
                <p>You need to <a th:href="@{/auth/login}">sign in</a> to register for this event.</p>
            </div>

            <!-- Already registered message -->
            <div sec:authorize="isAuthenticated()" th:if="${isUserRegistered}"
                 class="alert alert-success" style="margin-top:1rem;">
                <i class="fas fa-check-circle"></i> You are already registered for this event.
            </div>

            <!-- Registration form (only shown when not yet registered) -->
            <form sec:authorize="isAuthenticated()" th:unless="${isUserRegistered}"
                  th:action="@{/register/{id}(id=${event.id})}" method="post" th:object="${form}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="form-row">
                    <input type="text" th:field="*{name}" placeholder="Full Name" required />
                </div>
                <div class="form-row">
                    <input type="email" th:field="*{email}" placeholder="Email" required />
                </div>
                <div class="form-row">
                    <input type="tel" th:field="*{phone}" placeholder="Phone (optional)" />
                </div>
                <button type="submit" class="btn" th:text="${isSoldOut ? 'Join Waitlist' : 'Register Now'}">Register</button>
            </form>
        </div>
    </section>
</div>
</html>
