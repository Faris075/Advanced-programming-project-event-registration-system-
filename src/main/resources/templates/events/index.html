<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: content('Events', ~{::pageBody})}">
<div th:fragment="pageBody">
    <section class="page-header">
        <h1>Upcoming Events</h1>
        <p>Browse published events and register before spots fill up.</p>
    </section>

    <div class="events-grid" th:if="${not #lists.isEmpty(events)}">
        <div th:each="event : ${events}" class="event-card">
            <h2 th:text="${event.title}">Event Title</h2>
            <p class="event-meta" th:text="${#temporals.format(event.dateTime, 'MMM dd, yyyy HH:mm')}">Date</p>
            <p class="event-location" th:text="${event.location}">Location</p>
            <p class="event-price" th:text="${event.free ? 'Free' : '$' + event.price}">Free</p>
            <p class="event-capacity">Capacity: <span th:text="${event.capacity}">100</span> spots</p>
            <span th:if="${registeredEventIds != null and registeredEventIds.contains(event.id)}"
                  class="badge badge-registered"
                  style="display:inline-block;background:#28a745;color:#fff;padding:.3rem .7rem;border-radius:.3rem;font-size:.85rem;margin-bottom:.5rem;">
                ✓ Registered
            </span>
            <a th:href="@{/events/{id}(id=${event.id})}" class="btn"
               th:text="${registeredEventIds != null and registeredEventIds.contains(event.id) ? 'View Event' : 'View Details'}">View Details</a>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(events)}">
        <p>No public events are available right now. Please check back later.</p>
    </div>
</div>
</html>
