<html xmlns:th="http://www.thymeleaf.org"

      th:replace="~{layout :: content('My Profile', ~{::pageBody})}">
<div th:fragment="pageBody">

    <section class="page-header">
        <h1>My Profile</h1>
        <p>Manage your account details.</p>
    </section>

    <div class="glass-card" style="max-width:520px;margin:0 auto;padding:2rem;">
        <p style="color:rgba(255,255,255,.6);text-align:center;padding:2rem 0;">
            Profile management is coming soon.
        </p>
        <div style="text-align:center;">
            <a th:href="@{/dashboard}" class="btn">Back to Dashboard</a>
        </div>
    </div>

</div>
</html>
