<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>403 – Access Denied | Evently</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="error-container" style="text-align:center; padding:80px 20px;">
    <h1>403</h1>
    <h2>Access Denied</h2>
    <p th:text="${message != null ? message : 'You do not have permission to access this page.'}">
        You do not have permission to access this page.
    </p>
    <a th:href="@{/dashboard}">Back to Home</a>
</div>
</body>
</html>
