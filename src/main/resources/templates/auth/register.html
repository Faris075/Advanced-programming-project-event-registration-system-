<!--
  Registration page template.
  Backing bean: UserRegistrationDto (OWNER: Alei)
  Controller:   AuthController.registerPage() / register()
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: content('Create Account', ~{::pageBody})}">
<div th:fragment="pageBody">
    <section class="auth-form">
        <h1>Create Account</h1>

        <form th:action="@{/auth/register}" method="post" th:object="${registrationDto}">
            <!-- CSRF token required by Spring Security -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label for="name">Full Name</label>
                <input id="name" type="text" th:field="*{name}"
                       autocomplete="name" placeholder="Jane Smith" />
                <!-- Server-side validation error (BindingResult) -->
                <span class="field-error" th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}">Name error</span>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input id="email" type="email" th:field="*{email}"
                       autocomplete="email" placeholder="you@example.com" />
                <span class="field-error" th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}">Email error</span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" th:field="*{password}"
                       autocomplete="new-password" placeholder="At least 8 characters" />
                <span class="field-error" th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}">Password error</span>
            </div>

            <div class="form-group">
                <label for="passwordConfirm">Confirm Password</label>
                <input id="passwordConfirm" type="password" th:field="*{passwordConfirm}"
                       autocomplete="new-password" placeholder="Re-enter password" />
                <span class="field-error" th:if="${#fields.hasErrors('passwordConfirm')}"
                      th:errors="*{passwordConfirm}">Confirm password error</span>
            </div>

            <!-- Global / cross-field error (e.g. passwords do not match) -->
            <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}">
                Error message placeholder.
            </div>

            <button type="submit" class="btn btn-full">Create Account</button>
        </form>

        <p class="auth-links">
            Already have an account? <a th:href="@{/auth/login}">Sign in</a>
        </p>
    </section>
</div>
</html>
