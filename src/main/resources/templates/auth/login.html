<!--
  Login page template.
  Spring Security handles POST /auth/login automatically (no controller method needed).
  OWNER: Alei (referenced by AuthController.loginPage())
-->
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: content('Login', ~{::pageBody})}">
<div th:fragment="pageBody">
    <section class="auth-form">
        <h1>Sign In</h1>

        <!-- Spring Security populates ?error on a failed login attempt. -->
        <div class="alert alert-error" th:if="${param.error}">
            Invalid email or password. Please try again.
        </div>

        <!-- Shown after a successful logout. -->
        <div class="alert alert-success" th:if="${param.logout}">
            You have been signed out.
        </div>

        <!-- Flash message passed by other controllers (e.g. after registration). -->
        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}">
            Success message placeholder.
        </div>

        <form action="/auth/login" method="post">
            <!-- CSRF token required by Spring Security -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label for="username">Email address</label>
                <input id="username" type="email" name="username"
                       autocomplete="email" required placeholder="you@example.com" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password"
                       autocomplete="current-password" required placeholder="••••••••" />
            </div>

            <div class="form-group form-check">
                <input id="remember-me" type="checkbox" name="remember-me" />
                <label for="remember-me">Remember me for 30 days</label>
            </div>

            <button type="submit" class="btn btn-full">Sign In</button>
        </form>

        <p class="auth-links">
            Don't have an account? <a th:href="@{/auth/register}">Create one</a>
        </p>
    </section>
</div>
</html>
