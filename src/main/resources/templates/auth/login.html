<!DOCTYPE html>
<!--
  Login page — standalone glassmorphism design (no layout wrapper).
  Spring Security handles POST /auth/login automatically.
  OWNER: Alei (referenced by AuthController.loginPage())
-->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Evently</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
    <!-- Decorative shapes (same as brand reference) -->
    <div class="shape" style="height:200px;width:200px;position:absolute;border-radius:50%;background:linear-gradient(#1845ad,#23a2f6);top:-80px;left:-80px;z-index:0;"></div>
    <div class="shape" style="height:150px;width:150px;position:absolute;border-radius:50%;background:linear-gradient(to right,#ff512f,#f09819);bottom:-60px;right:-60px;z-index:0;"></div>

    <div class="auth-wrapper">
        <form class="auth-form" action="/auth/login" method="post" autocomplete="on">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <h1>Evently</h1>

            <!-- Spring Security populates ?error on a failed login attempt -->
            <div class="alert alert-error" th:if="${param.error}" style="margin-bottom:1.25rem">
                <i class="fas fa-exclamation-circle" style="margin-right:.4rem"></i>
                Invalid email or password. Please try again.
            </div>

            <!-- Shown after a successful logout -->
            <div class="alert alert-success" th:if="${param.logout}" style="margin-bottom:1.25rem">
                <i class="fas fa-check-circle" style="margin-right:.4rem"></i>
                You have been signed out.
            </div>

            <!-- Flash message from other controllers -->
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}" style="margin-bottom:1.25rem"></div>

            <div class="form-group">
                <label for="username">Email address</label>
                <input id="username" type="email" name="username"
                       autocomplete="email" required placeholder="you@example.com" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password"
                       autocomplete="current-password" required placeholder="••••••••" />
            </div>

            <div class="form-group form-check" style="margin-bottom:1.5rem">
                <input id="remember-me" type="checkbox" name="remember-me" />
                <label for="remember-me" style="margin-bottom:0;font-size:.85rem;">Remember me for 30 days</label>
            </div>

            <button type="submit" class="btn btn-full">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>

            <p class="auth-links">
                Don't have an account? <a th:href="@{/auth/register}">Create one</a>
            </p>
        </form>
    </div>
</body>
</html>
