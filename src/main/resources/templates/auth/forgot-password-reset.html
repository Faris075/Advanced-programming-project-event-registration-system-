<!DOCTYPE html>
<!--
  Forgot password step 3 — set new password.
  Controller: SecurityQuestionController.forgotPasswordStep3() / forgotPasswordStep3Submit()
  OWNER: Alei
-->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — Evently</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
    <div class="shape" style="height:200px;width:200px;position:absolute;border-radius:50%;background:linear-gradient(#1845ad,#23a2f6);top:-80px;left:-80px;z-index:0;"></div>
    <div class="shape" style="height:150px;width:150px;position:absolute;border-radius:50%;background:linear-gradient(to right,#ff512f,#f09819);bottom:-60px;right:-60px;z-index:0;"></div>

    <div class="auth-wrapper">
        <form class="auth-form" th:action="@{/auth/forgot-password/reset}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <h1>Set New Password</h1>

            <div class="alert alert-error" th:if="${error}" th:text="${error}" style="margin-bottom:1.25rem"></div>

            <div class="form-group">
                <label for="newPassword">New password</label>
                <input id="newPassword" type="password" name="newPassword"
                       autocomplete="new-password" required placeholder="At least 8 characters" />
            </div>

            <div class="form-group" style="margin-bottom:1.5rem">
                <label for="passwordConfirm">Confirm password</label>
                <input id="passwordConfirm" type="password" name="passwordConfirm"
                       autocomplete="new-password" required placeholder="Re-enter password" />
            </div>

            <button type="submit" class="btn btn-full">
                <i class="fas fa-lock"></i> Reset Password
            </button>

            <p class="auth-links">
                Remember your password? <a th:href="@{/auth/login}">Sign in</a>
            </p>
        </form>
    </div>
</body>
</html>
