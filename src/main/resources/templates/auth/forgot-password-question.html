<!DOCTYPE html>
<!--
  Forgot password step 2 — answer security question.
  Controller: SecurityQuestionController.forgotPasswordStep2() / forgotPasswordStep2Submit()
  OWNER: Alei
-->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Question — Evently</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
    <div class="shape" style="height:200px;width:200px;position:absolute;border-radius:50%;background:linear-gradient(#1845ad,#23a2f6);top:-80px;left:-80px;z-index:0;"></div>
    <div class="shape" style="height:150px;width:150px;position:absolute;border-radius:50%;background:linear-gradient(to right,#ff512f,#f09819);bottom:-60px;right:-60px;z-index:0;"></div>

    <div class="auth-wrapper">
        <form class="auth-form" th:action="@{/auth/forgot-password/question}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <h1>Verify Identity</h1>

            <div class="alert alert-error" th:if="${error}" th:text="${error}" style="margin-bottom:1.25rem"></div>

            <div style="background:#f5f5f5;padding:1rem;border-radius:.5rem;margin-bottom:1.5rem;border-left:4px solid #1845ad;">
                <p style="margin:0;color:#333;font-weight:500;" th:text="${question}"></p>
            </div>

            <div class="form-group" style="margin-bottom:1.5rem">
                <label for="answer">Your answer</label>
                <input id="answer" type="text" name="answer"
                       autocomplete="off" required placeholder="Enter your answer" />
            </div>

            <button type="submit" class="btn btn-full">
                <i class="fas fa-check-circle"></i> Verify Answer
            </button>

            <p class="auth-links">
                <a th:href="@{/auth/forgot-password}">Start over</a>
            </p>
        </form>
    </div>
</body>
</html>
