name: Java CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn --batch-mode --update-snapshots verify
        env:
          DB_USERNAME: sa
          DB_PASSWORD: ''
          APP_SECRET: ci-test-secret
          MAIL_USERNAME: ''
          MAIL_PASSWORD: ''
